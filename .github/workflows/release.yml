name: release

# 두 가지 방법으로 릴리스(둘 다 무서명 빌드 → 초안):
#  1) v* 태그 직접 push.
#  2) Actions "Run workflow"(workflow_dispatch) — patch/minor/major 만 고르면
#     prepare 잡이 버전 bump + main 커밋 + 태그까지 자동 생성(원클릭).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: '버전 증가 단위'
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  # workflow_dispatch 일 때만: 버전을 올리고 main 에 커밋 + 태그를 push.
  # (GITHUB_TOKEN 이 push 한 태그는 다른 워크플로를 트리거하지 않으므로 중복 빌드 없음.)
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: 버전 bump + 커밋 + 태그
        id: bump
        run: |
          cur=$(node -p "require('./package.json').version")
          IFS='.' read -r MA MI PA <<< "$cur"
          case "${{ inputs.bump }}" in
            major) MA=$((MA + 1)); MI=0; PA=0 ;;
            minor) MI=$((MI + 1)); PA=0 ;;
            patch) PA=$((PA + 1)) ;;
          esac
          NEW="$MA.$MI.$PA"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          sed -i "s/\"version\": \"[0-9][0-9.]*\"/\"version\": \"$NEW\"/" package.json
          sed -i "s/\"version\": \"[0-9][0-9.]*\"/\"version\": \"$NEW\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[0-9.]*\"/version = \"$NEW\"/" src-tauri/Cargo.toml
          NEW="$NEW" perl -0pi -e 's/(name = "polyview"\nversion = ")[^"]*/$1$ENV{NEW}/' src-tauri/Cargo.lock
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: v$NEW"
          git tag "v$NEW"
          git push origin main
          git push origin "v$NEW"

  # 매트릭스 빌드 전에 릴리스(초안)를 한 번만 만든다. 여러 플랫폼 잡이 동시에
  # 릴리스를 생성하려다 경쟁해 중복 릴리스로 쪼개지는 것을 막는다(빌드는 이 한
  # 릴리스에 자산만 업로드한다).
  create-release:
    needs: [prepare]
    if: always() && (github.event_name == 'push' || needs.prepare.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: 태그 결정
        id: meta
        run: echo "tag=${{ needs.prepare.outputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: 초안 릴리스 생성
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.meta.outputs.tag }}";
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Polyview ${tag}`,
              body: '다운로드 후 설치하세요. 무서명 빌드라 macOS 는 처음 실행 시 Polyview.app 을 우클릭 → 열기 로 한 번 우회해야 합니다(README 참고).',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: [create-release]
    if: always() && needs.create-release.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS 는 universal 바이너리 하나로 Intel·Apple Silicon 모두 커버한다.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: Linux 시스템 의존성 설치 (ubuntu 전용)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust 캐시
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 프런트엔드 의존성 설치
        run: npm ci

      - name: 빌드 + 자산 업로드 (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
